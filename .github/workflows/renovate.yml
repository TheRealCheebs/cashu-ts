name: Renovate

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write
  checks: write

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v44.0.2
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_VERSION: 42.2.0
          RENOVATE_REPOSITORIES: |
            ["${{ github.repository }}"]
          RENOVATE_CONFIG_FILE: .github/renovate.json
